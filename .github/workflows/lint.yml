name: 代码质量检查

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 mypy
          pip install -e .  # 安装包以解决类型检查中的导入问题

      - name: 代码格式检查 (Black)
        run: |
          black --check src/ tests/

      - name: 代码风格检查 (Flake8)
        run: |
          flake8 src/ tests/ --max-line-length=100 --exclude=__pycache__,.git,__pycache__

      - name: 类型检查 (Mypy)
        run: |
          mypy src/ --ignore-missing-imports || true
