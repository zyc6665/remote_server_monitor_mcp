# MCP Server Monitor Configuration
# 复制此文件为 servers.yaml 并填写真实信息

servers:
  # 服务器 1：生产环境
  - name: production
    host: 192.168.1.100
    port: 22
    username: ubuntu
    # 优先使用密钥认证
    private_key_path: ~/.ssh/id_rsa
    # 或者使用密码（不推荐，仅用于测试）
    password: null

  # 服务器 2：开发环境
  - name: development
    host: 192.168.1.101
    port: 22
    username: deploy
    private_key_path: ~/.ssh/id_rsa

  # 服务器 3：临时测试
  - name: staging
    host: 192.168.1.102
    port: 22
    username: root
    password: your_password_here

# 默认服务器（可选）
default_server: production

# 连接超时设置（秒）
connect_timeout: 10
command_timeout: 30
